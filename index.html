<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📻 Помощник по докладам РП</title>
  <style>
    :root {
      --bg: #0f1115; --card: #1a1d24; --accent: #3b82f6; --accent-hover: #2563eb;
      --text: #e2e8f0; --muted: #94a3b8; --border: #2d3748; --success: #10b981;
    }
    * { box-sizing: border-box; outline: none; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { text-align: center; color: var(--accent); margin-bottom: 10px; font-weight: 700; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 25px; font-size: 0.9rem; }
    
    .settings { background: var(--card); padding: 15px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
    .setting-group { display: flex; flex-direction: column; }
    .setting-group label { font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
    .setting-group input, .setting-group select { background: #232730; border: 1px solid var(--border); color: var(--text); padding: 9px 10px; border-radius: 8px; font-size: 0.9rem; transition: 0.2s; }
    .setting-group input:focus, .setting-group select:focus { border-color: var(--accent); }
    
    .section { margin-bottom: 22px; }
    .section-title { font-size: 1.05rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    
    .report-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; border: 1px solid var(--border); transition: 0.2s; }
    .report-item:hover { border-color: #475569; }
    .report-text { font-family: 'Consolas', 'Courier New', monospace; font-size: 0.95rem; word-break: break-word; flex: 1; line-height: 1.4; }
    .copy-btn { background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; white-space: nowrap; }
    .copy-btn:hover { background: var(--accent-hover); }
    .copy-btn.copied { background: var(--success); color: #fff; }

    @media (max-width: 650px) {
      .settings { grid-template-columns: 1fr; }
      .report-item { flex-direction: column; align-items: stretch; text-align: center; }
      .copy-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📻 Помощник по докладам</h1>
    <p class="subtitle">Заполните поля сверху → текст докладов обновится автоматически → нажмите «Копировать»</p>
    
    <div class="settings" id="settingsPanel"></div>
    <div id="reportsContainer"></div>
  </div>

  <script>
    const STORAGE_KEY = 'rp_radio_helper_v1';
    let settings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    const settingsConfig = [
      { id: 'tag', label: 'Отделение / Тег', type: 'text', default: 'ЦЭМП' },
      { id: 'partner', label: 'Напарник (оставьте пустым, если нет)', type: 'text', default: '' },
      { id: 'callId', label: 'ID вызова', type: 'text', default: 'id' },
      { id: 'minutes', label: 'Время перерыва (мин)', type: 'number', default: '15' },
      { id: 'postNum', label: 'Номер поста СМП', type: 'number', default: '5' },
      { id: 'buildLoc', label: 'Место построения', type: 'select', options: ['крыше', 'парковке'], default: 'крыше' },
      { id: 'buildMin', label: 'Время готовности (мин)', type: 'number', default: '5' },
      { id: 'jurFrom', label: 'Юрисдикция (от)', type: 'select', options: ['ЦГБ-П'], default: 'ЦГБ-П' },
      { id: 'jurTo', label: 'Юрисдикция (к)', type: 'select', options: ['ОКБ', 'ЦГБ-Н', 'МЗ'], default: 'ОКБ' },
      { id: 'crossPurpose', label: 'Цель пересечения', type: 'select', options: ['обработки вызова', 'запроса'], default: 'обработки вызова' },
      { id: 'vehicle', label: 'Тип транспорта', type: 'select', options: ['АСМП', 'ВСМП'], default: 'АСМП' },
      { id: 'dept', label: 'Отдел построения', type: 'select', options: ['сотрудников КДЛ', 'сотрудников ЭКЦ «Гармония»', 'сотрудников ЦЭМП', 'сотрудников ИПК'], default: 'сотрудников ЦЭМП' }
    ];

    const reportsData = [
      { category: "О заступлении/сдачи смены", items: ["r {{TAG}}, заступил на смену.", "r {{TAG}}, сдал смену."] },
      { category: "Перерывы", items: ["r {{TAG}}, разрешите взять перерыв на {{MINUTES}} минут?", "r {{TAG}}, взял обеденный перерыв.", "r {{TAG}}, вернулся с перерыва."] },
      { category: "Об обработке вызова", items: ["r {{TAG}}, принял вызов №{{CALL_ID}}. Напарник: {{PARTNER}}.", "r {{TAG}}, вызов №{{CALL_ID}} выполнен. Госпитализация. Напарник: {{PARTNER}}.", "r {{TAG}}, вызов №{{CALL_ID}} выполнен на месте. Возвращаемся. Напарник: {{PARTNER}}.", "r {{TAG}}, вызов №{{CALL_ID}} ложный. Возвращаемся. Напарник: {{PARTNER}}.", "r {{TAG}}, вызов №{{CALL_ID}} отменён. Возвращаемся. Напарник: {{PARTNER}}.", "r {{TAG}}, вызов завершён. На базе. Напарник: {{PARTNER}}."] },
      { category: "При патруле", items: ["r {{TAG}}, выехал в патруль юрисдикции. Напарник: {{PARTNER}}.", "r {{TAG}}, продолжаю патруль юрисдикции. Напарник: {{PARTNER}}.", "r {{TAG}}, заканчиваю патруль юрисдикции. На базе. Напарник: {{PARTNER}}."] },
      { category: "На посту", items: ["r {{TAG}}, выехал на пост СМП №{{POST_NUM}}. Напарник: {{PARTNER}}.", "r {{TAG}}, прибыл на пост СМП №{{POST_NUM}}. ЧП не выявлено. Напарник: {{PARTNER}}.", "r {{TAG}}, продолжаю дежурство на посту СМП №{{POST_NUM}}. ЧП не выявлено. Напарник: {{PARTNER}}.", "r {{TAG}}, заканчиваю дежурство на посту СМП №{{POST_NUM}}. Возвращаюсь на базу. Напарник: {{PARTNER}}.", "r {{TAG}}, пост СМП №{{POST_NUM}}. На базе. Напарник: {{PARTNER}}."] },
      { category: "О пересечении территории", items: ["ro [{{JUR_FROM}}] к [{{JUR_TO}}] Пересекаю границу Вашей юрисдикции для {{CROSS_PURPOSE}}.", "ro [{{JUR_FROM}}] к [{{JUR_TO}}/МЗ] Разрешите патрулирование Вашей юрисдикции на {{VEHICLE}}."] },
      { category: "Блок для Руководящего состава", items: ["r {{TAG}} | Объявлено всеобщее построение состава на {{BUILD_LOC}} больницы. Готовность {{BUILD_MIN}} минут.", "r {{TAG}} | Всеобщее построение состава на {{BUILD_LOC}} больницы.", "r {{TAG}} | Объявлено построение {{DEPT}} на {{BUILD_LOC}} больницы. Готовность {{BUILD_MIN}} минут.", "r {{TAG}} | Построение {{DEPT}} на {{BUILD_LOC}} больницы."] },
      { category: "ВСМП", items: ["r {{TAG}}, ВСМП. Вылетаем для патрулирования юрисдикции. Напарник: {{PARTNER}}.", "r {{TAG}}, ВСМП. Продолжаем патрулирование юрисдикции. Напарник: {{PARTNER}}.", "r {{TAG}}, ВСМП. Заканчиваем патрулирование юрисдикции. На базе. Напарник: {{PARTNER}}."] },
      { category: "Служебный ПАЗ", items: ["r {{TAG}}, взял служебный ПАЗ в рабочих целях.", "r {{TAG}}, вернул служебный ПАЗ на парковку."] }
    ];

    function getSettings() { return settings; }
    function saveSettings() { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); renderReports(); }

    function renderSettings() {
      document.getElementById('settingsPanel').innerHTML = settingsConfig.map(cfg => {
        let input = '';
        if (cfg.type === 'select') {
          input = `<select onchange="updateSetting('${cfg.id}', this.value)">
            ${cfg.options.map(o => `<option value="${o}" ${settings[cfg.id]===o?'selected':''}>${o}</option>`).join('')}
          </select>`;
        } else {
          input = `<input type="${cfg.type}" value="${settings[cfg.id]}" oninput="updateSetting('${cfg.id}', this.value)" placeholder="${cfg.default}">`;
        }
        return `<div class="setting-group"><label>${cfg.label}</label>${input}</div>`;
      }).join('');
    }

    function updateSetting(id, val) { settings[id] = val; saveSettings(); }

    function processTemplate(template) {
      const s = getSettings();
      let text = template;
      if (!s.partner.trim()) {
        text = text.replace(/ Напарник: \{\{PARTNER\}\}\./g, '');
      } else {
        text = text.replaceAll('{{PARTNER}}', s.partner);
      }
      const reps = {'{{TAG}}':s.tag,'{{CALL_ID}}':s.callId,'{{MINUTES}}':s.minutes,'{{POST_NUM}}':s.postNum,'{{BUILD_LOC}}':s.buildLoc,'{{BUILD_MIN}}':s.buildMin,'{{JUR_FROM}}':s.jurFrom,'{{JUR_TO}}':s.jurTo,'{{CROSS_PURPOSE}}':s.crossPurpose,'{{VEHICLE}}':s.vehicle,'{{DEPT}}':s.dept};
      for(let k in reps) text = text.replaceAll(k, reps[k] || '');
      return text.replace(/  +/g,' ').replace(/\s+\./g,'.').replace(/\.\./g,'.').trim();
    }

    function renderReports() {
      document.getElementById('reportsContainer').innerHTML = reportsData.map(sec => `
        <div class="section">
          <div class="section-title">${sec.category}</div>
          ${sec.items.map((tpl, i) => {
            const id = `r_${sec.category.replace(/\s/g,'_')}_${i}`;
            return `<div class="report-item"><div class="report-text" id="${id}">${processTemplate(tpl)}</div><button class="copy-btn" onclick="copyToClipboard('${id}', this)">Копировать</button></div>`;
          }).join('')}
        </div>
      `).join('');
    }

    function copyToClipboard(id, btn) {
      const text = document.getElementById(id).innerText;
      const fallback = () => { const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); };
      (navigator.clipboard ? navigator.clipboard.writeText(text).catch(fallback) : fallback()).then(() => {
        btn.classList.add('copied'); btn.textContent = '✓ Скопировано';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Копировать'; }, 1200);
      });
    }

    // Init
    settingsConfig.forEach(c => { if(settings[c.id]===undefined) settings[c.id]=c.default; });
    renderSettings(); renderReports();
  </script>
</body>
</html>
